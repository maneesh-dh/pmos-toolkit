notes: |
  Feature: rework /feature-sdlc worktree creation + resume to use harness-native EnterWorktree.

  Spike findings (pre-pipeline):
    - EnterWorktree(path=) cleanly enters externally-created worktrees.
    - Subagents inherit the EnterWorktree-shifted cwd. (Tested via dispatched general-purpose Agent reporting pwd inside an EnterWorktree session.)
    - macOS canonicalizes /tmp -> /private/tmp; pre-flight realpath comparison required.
    - ExitWorktree refuses to remove externally-created worktrees; cleanup uses git worktree remove.

  Pre-pipeline empirical findings:
    - .pmos/feature-sdlc/state.yaml is currently TRACKED in git. Every new worktree inherits the previous feature's state.yaml. Per-worktree state requires this path to be gitignored.
    - The committed state.yaml in main is from feature pipeline-consolidation (now shipped at v2.34.0).

  In-scope follow-ons:
    - /complete-dev learns to git worktree remove on success.
    - .pmos/feature-sdlc/ added to .gitignore; existing committed state.yaml removed from tracking.

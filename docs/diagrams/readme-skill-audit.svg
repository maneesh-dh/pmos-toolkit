<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1320" font-family="system-ui, sans-serif" font-size="12" fill="#111">
  <title>/readme skill — audit flow sequence diagram</title>
  <desc>UML sequence diagram showing the /readme skill orchestrating discovery, rubric scoring, parallel persona dispatch, quote validation, user dispositions, diff preview, and atomic write.</desc>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#111" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="590" y="28" text-anchor="middle" font-size="16" font-weight="600">/readme skill — audit flow (spec §6.2)</text>
  <text x="590" y="46" text-anchor="middle" font-size="11" fill="#555">User · /readme · workspace-discovery · rubric.sh · simulated-reader ×3 · diff-preview/atomic-write</text>

  <!-- Participant boxes -->
  <g stroke="#111" stroke-width="1" fill="#fff">
    <rect x="40"   y="70" width="100" height="34"/>
    <rect x="180"  y="70" width="120" height="34"/>
    <rect x="340"  y="70" width="160" height="34"/>
    <rect x="540"  y="70" width="120" height="34"/>
    <rect x="700"  y="70" width="200" height="34"/>
    <rect x="940"  y="70" width="200" height="34"/>
  </g>
  <g text-anchor="middle" font-weight="600">
    <text x="90"  y="91">User</text>
    <text x="240" y="91">/readme</text>
    <text x="420" y="91">workspace-discovery</text>
    <text x="600" y="91">rubric.sh</text>
    <text x="800" y="86">simulated-reader</text>
    <text x="800" y="100" font-weight="400" font-size="10" fill="#555">×3 personas (parallel)</text>
    <text x="1040" y="86">diff-preview /</text>
    <text x="1040" y="100" font-weight="400" font-size="10" fill="#555">atomic write</text>
  </g>

  <!-- Lifelines -->
  <g stroke="#888" stroke-width="1" stroke-dasharray="4 4">
    <line x1="90"   y1="104" x2="90"   y2="1280"/>
    <line x1="240"  y1="104" x2="240"  y2="1280"/>
    <line x1="420"  y1="104" x2="420"  y2="1280"/>
    <line x1="600"  y1="104" x2="600"  y2="1280"/>
    <line x1="800"  y1="104" x2="800"  y2="1280"/>
    <line x1="1040" y1="104" x2="1040" y2="1280"/>
  </g>

  <!-- /readme activation bar (main) -->
  <rect x="235" y="135" width="10" height="1100" fill="#eee" stroke="#666" stroke-width="0.5"/>

  <!-- 1. User -> /readme: invocation -->
  <g stroke="#111" stroke-width="1.2" fill="none">
    <line x1="90" y1="135" x2="235" y2="135" marker-end="url(#arrow)"/>
  </g>
  <text x="162" y="129" text-anchor="middle">1. /readme  (invocation)</text>

  <!-- 2. /readme -> workspace-discovery: discover(repo-root) -->
  <line x1="245" y1="175" x2="418" y2="175" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="332" y="169" text-anchor="middle">2. discover(repo-root)</text>
  <rect x="415" y="175" width="10" height="40" fill="#eee" stroke="#666" stroke-width="0.5"/>

  <!-- 3. workspace-discovery -> /readme: {repo_type, scope} -->
  <line x1="415" y1="215" x2="245" y2="215" stroke="#111" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-open)"/>
  <text x="332" y="209" text-anchor="middle">3. { repo_type, scope }</text>

  <!-- 4. /readme -> rubric.sh: score(readme.md, variant) -->
  <line x1="245" y1="255" x2="598" y2="255" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="422" y="249" text-anchor="middle">4. score(readme.md, variant=&lt;type&gt;)</text>
  <rect x="595" y="255" width="10" height="40" fill="#eee" stroke="#666" stroke-width="0.5"/>

  <!-- 5. rubric.sh -> /readme: findings[] -->
  <line x1="595" y1="295" x2="245" y2="295" stroke="#111" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-open)"/>
  <text x="422" y="289" text-anchor="middle">5. findings[]  (15-check rubric output)</text>

  <!-- 6. self-loop: auto-apply mechanical -->
  <path d="M 245 330 H 310 V 355 H 248" fill="none" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="318" y="335">6. auto-apply mechanical findings</text>

  <!-- 7. parallel dispatch to 3 personas -->
  <g stroke="#111" stroke-width="1.2" fill="none">
    <line x1="245" y1="395" x2="798" y2="385" marker-end="url(#arrow)"/>
    <line x1="245" y1="400" x2="798" y2="400" marker-end="url(#arrow)"/>
    <line x1="245" y1="405" x2="798" y2="415" marker-end="url(#arrow)"/>
  </g>
  <text x="500" y="378" text-anchor="middle">7. dispatch personas(readme markdown)  —  evaluator · adopter · contributor</text>
  <!-- Note: parallel dispatch -->
  <g>
    <rect x="850" y="365" width="280" height="36" fill="#fffbe6" stroke="#b59700" stroke-width="0.8"/>
    <text x="858" y="380" font-size="11" font-weight="600" fill="#7a5a00">Note (D13)</text>
    <text x="858" y="395" font-size="11" fill="#5a4500">3 personas dispatched concurrently</text>
  </g>
  <rect x="795" y="385" width="10" height="60" fill="#eee" stroke="#666" stroke-width="0.5"/>

  <!-- 8. three return arrows -->
  <g stroke="#111" stroke-width="1" stroke-dasharray="5 3" fill="none">
    <line x1="795" y1="445" x2="248" y2="455" marker-end="url(#arrow-open)"/>
    <line x1="795" y1="455" x2="248" y2="465" marker-end="url(#arrow-open)"/>
    <line x1="795" y1="465" x2="248" y2="475" marker-end="url(#arrow-open)"/>
  </g>
  <text x="500" y="438" text-anchor="middle">8. { persona, friction[{ quote, line, severity }] }  × 3</text>

  <!-- 9. self-loop: validate quotes -->
  <path d="M 245 510 H 310 V 535 H 248" fill="none" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="318" y="515">9. validate quotes  (substring-grep)</text>
  <!-- Note: FR-SR-3 -->
  <g>
    <rect x="560" y="498" width="280" height="36" fill="#fffbe6" stroke="#b59700" stroke-width="0.8"/>
    <text x="568" y="513" font-size="11" font-weight="600" fill="#7a5a00">Note — FR-SR-3</text>
    <text x="568" y="528" font-size="11" fill="#5a4500">parent-side substring-grep (FR-50/51/52 contract)</text>
  </g>

  <!-- 10. /readme -> User: AskUserQuestion batches -->
  <line x1="235" y1="580" x2="93" y2="580" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="164" y="574" text-anchor="middle">10. AskUserQuestion  (batches ≤4)</text>

  <!-- 11. User -> /readme: dispositions -->
  <line x1="90" y1="615" x2="235" y2="615" stroke="#111" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-open)"/>
  <text x="164" y="609" text-anchor="middle">11. dispositions</text>

  <!-- 12. self-loop: apply structural fixes -->
  <path d="M 245 650 H 310 V 675 H 248" fill="none" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="318" y="655">12. apply structural fixes inline</text>

  <!-- 13. self-loop: render unified diff -->
  <path d="M 245 710 H 310 V 735 H 248" fill="none" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="318" y="715">13. render unified diff  (per-file headers)</text>

  <!-- 14. /readme -> User: confirm write -->
  <line x1="235" y1="775" x2="93" y2="775" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="164" y="769" text-anchor="middle">14. AskUserQuestion  (confirm write)</text>

  <!-- 15. User -> /readme: Yes -->
  <line x1="90" y1="810" x2="235" y2="810" stroke="#111" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-open)"/>
  <text x="164" y="804" text-anchor="middle">15. Yes</text>

  <!-- 16. /readme -> diff-preview/atomic-write -->
  <line x1="245" y1="855" x2="1038" y2="855" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="640" y="849" text-anchor="middle">16. atomic write  (temp file + rename)</text>
  <rect x="1035" y="855" width="10" height="40" fill="#eee" stroke="#666" stroke-width="0.5"/>
  <!-- return ack -->
  <line x1="1035" y1="895" x2="245" y2="895" stroke="#111" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-open)"/>
  <text x="640" y="889" text-anchor="middle">ack  (write complete)</text>

  <!-- 17. /readme -> User: done -->
  <line x1="235" y1="940" x2="93" y2="940" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="164" y="934" text-anchor="middle">17. done — suggest /polish; DO NOT COMMIT</text>

  <!-- End note -->
  <g>
    <rect x="280" y="985" width="640" height="50" fill="#f3f6ff" stroke="#3a5bd9" stroke-width="0.8"/>
    <text x="600" y="1005" text-anchor="middle" font-size="11" font-weight="600" fill="#1c2e7a">Release boundary</text>
    <text x="600" y="1022" text-anchor="middle" font-size="11" fill="#1c2e7a">/complete-dev is the canonical release entry — /readme never commits.</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 1080)">
    <text x="0" y="0" font-weight="600" font-size="11">Legend</text>
    <line x1="0" y1="18" x2="60" y2="18" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="70" y="22" font-size="11">synchronous call / request</text>
    <line x1="0" y1="38" x2="60" y2="38" stroke="#111" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-open)"/>
    <text x="70" y="42" font-size="11">return / response</text>
    <path d="M 0 58 H 30 V 70 H 2" fill="none" stroke="#111" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="70" y="66" font-size="11">self-message (internal step)</text>
    <rect x="0" y="80" width="14" height="14" fill="#eee" stroke="#666" stroke-width="0.5"/>
    <text x="22" y="91" font-size="11">activation bar</text>
    <rect x="160" y="80" width="14" height="14" fill="#fffbe6" stroke="#b59700" stroke-width="0.8"/>
    <text x="182" y="91" font-size="11">contract / decision note</text>
  </g>
</svg>

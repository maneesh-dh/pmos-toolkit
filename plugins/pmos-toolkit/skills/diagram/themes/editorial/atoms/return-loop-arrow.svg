<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200">
  <title>editorial return-loop arrow atom — dashed blue curved bezier with arrowhead (feedback role)</title>
  <defs>
    <marker id="arrow-feedback" viewBox="0 0 8 6" refX="8" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 3 L 0 6 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="320" height="200" fill="#F4EFE6"/>
  <!-- two anchor points: source (right side) and target (left side); curve loops over the top -->
  <circle cx="260" cy="140" r="6" fill="#1E3A8A"/>
  <circle cx="60" cy="140" r="6" fill="#1E3A8A"/>
  <path d="M 260 140 C 260 40 60 40 60 140"
        fill="none" stroke="#1E3A8A" stroke-width="1.5" stroke-dasharray="6 4"
        marker-end="url(#arrow-feedback)"/>
  <text x="160" y="36" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="12" font-weight="400" fill="#475569"
        letter-spacing="0.96">FEEDBACK / MEMORY LOOP</text>
</svg>
